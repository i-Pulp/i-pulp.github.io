<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Product Details - PULP</title>
<link rel="stylesheet" href="StyleTemplate.css">
</head>
<body>
<header>
  <a class="brand" href="index.html">
    <div class="logo">P</div>
    <div>
      <div style="font-weight:800">PULP</div>
      <div style="font-size:0.8rem;color:var(--muted)">Handmade with love</div>
    </div>
  </a>
  <nav>
    <a href="index.html#shop">Categories</a>
    <a href="index.html#about">About</a>
  </nav>
</header>
<main class="detail-view">
  <div id="loading-skeleton">
    <div class="skeleton title"></div>
    <div class="skeleton img"></div>
    <div class="skeleton button"></div>
  </div>
  <div id="product-content" style="display:none; width: 100%;">
    <h1 id="product-name"></h1>
    <div class="product-images" id="product-images"></div>
    <p class="price" id="product-price"></p>
    <p class="description" id="product-description"></p>
    <div class="button-group">
      <a href="#" id="buy-amazon" class="buy-button" target="_blank">Buy on Amazon</a>
      <a href="https://ig.me/m/pulponlinstore" id="insta-btn" class="buy-button" target="_blank">Order from Instagram</a>
    </div>
  </div>
</main>
<footer>&copy; 2025 PULP. All rights reserved.</footer>
<script>
async function loadProductPage() {
    const params = new URLSearchParams(window.location.search);
    const category = params.get("category") || "baby_accessories";
    const prodKey = params.get("prod");
    try {
        const response = await fetch(`${category}.json`);
        const data = await response.json();
        const product = data.products.find(p => p.id === prodKey);
        if (!product) return;

        document.getElementById("loading-skeleton").style.display = "none";
        document.getElementById("product-content").style.display = "block";
        document.getElementById("product-name").textContent = product.title;
        document.getElementById("product-price").textContent = product.price;
        document.getElementById("product-description").textContent = product.description;
        
        const amazonBtn = document.getElementById("buy-amazon");
        const instaBtn = document.getElementById("insta-btn");

        // Visibility and Text Logic
        if (product.outOfStock) {
            amazonBtn.style.display = 'none';
            instaBtn.style.display = 'none';
        } else if (product.comingSoon) {
            amazonBtn.style.display = 'none';
            instaBtn.style.display = 'block';
            instaBtn.textContent = 'Pre-Order';
        } else {
            amazonBtn.style.display = product.amazonLink ? 'block' : 'none';
            amazonBtn.href = product.amazonLink || '#';
            instaBtn.style.display = 'block';
            instaBtn.textContent = 'Order from Instagram';
        }

        const imagesContainer = document.getElementById("product-images");
        imagesContainer.innerHTML = '';
        if (product.outOfStock) imagesContainer.innerHTML += '<div class="out-of-stock-tag">Out Of Stock</div>';
        if (product.comingSoon) imagesContainer.innerHTML += '<div class="coming-soon-tag">Coming Soon!</div>';

        product.images.forEach(imgObj => {
            const img = document.createElement("img");
            img.src = typeof imgObj === 'string' ? imgObj : imgObj.src;
            imagesContainer.appendChild(img);
        });
    } catch (err) { console.error(err); }
}
loadProductPage();
</script>
</body>
</html>
