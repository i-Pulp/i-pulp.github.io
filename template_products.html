<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Product Listing - PULP</title>
<link rel="stylesheet" href="StyleTemplate.css">
</head>
<body>
<header>
  <a class="brand" href="index.html">
    <div class="logo">P</div>
    <div>
      <div style="font-weight:800">PULP</div>
      <div style="font-size:0.8rem;color:var(--muted)">Handmade with love</div>
    </div>
  </a>
  <nav>
    <a href="index.html#shop">Categories</a>
    <a href="index.html#about">About</a>
  </nav>
</header>
<main>
  <h1 id="page-title">Loading...</h1>
  <p class="description" id="page-description"></p>
  <section id="product-section" style="max-width:1100px; margin: 24px auto; width: 100%;">
    <div id="product-grid" class="product-grid"></div>
    <nav id="pagination" aria-label="Product pagination"></nav>
  </section>
</main>
<footer>&copy; 2025 PULP. All rights reserved.</footer>

<script>
  const productsPerPage = 6;
  let products = [];
  let totalPages = 1;
  let currentPage = parseInt(sessionStorage.getItem('lastPage')) || 1;

  async function loadProducts() {
    const params = new URLSearchParams(window.location.search);
    const category = params.get('category') || 'baby_accessories';
    try {
      const res = await fetch(`${category}.json`);
      const data = await res.json();
      document.getElementById('page-title').textContent = data.title;
      document.getElementById('page-description').textContent = data.description;
      products = data.products || [];
      products.forEach(p => { p.id = p.id.replace(/_/g, '-'); });
      totalPages = Math.ceil(products.length / productsPerPage);
      renderPage(currentPage > totalPages ? 1 : currentPage);
    } catch (err) { console.error(err); }
  }

  function renderPage(page) {
    const grid = document.getElementById('product-grid');
    grid.classList.add('fading');
    
    setTimeout(() => {
      currentPage = page;
      sessionStorage.setItem('lastPage', currentPage);
      
      const start = (page - 1) * productsPerPage;
      const pageProducts = products.slice(start, start + productsPerPage);
      grid.innerHTML = '';

      pageProducts.forEach((prod) => {
        const category = new URLSearchParams(window.location.search).get('category') || 'baby_accessories';
        const detailHref = prod.link || `template_buy.html?category=${category}&prod=${prod.id}`;
        const article = document.createElement('article');
        article.className = 'product-card';
        article.onclick = () => window.location.href = detailHref;

        const slidesHTML = prod.images.map(img => `<img src="${typeof img === 'string' ? img : img.src}" alt="${prod.title}" loading="lazy">`).join('');

        article.innerHTML = `
          <div class="slider">
            <div class="slides">${slidesHTML}</div>
            ${prod.outOfStock ? '<div class="out-of-stock-tag">Out Of Stock</div>' : ''}
            ${prod.comingSoon ? '<div class="coming-soon-tag">Coming Soon!</div>' : ''}
            <button class="slider-button prev" aria-label="Prev">&#10094;</button>
            <button class="slider-button next" aria-label="Next">&#10095;</button>
          </div>
          <h2 class="product-title">${prod.title}</h2>
        `;
        grid.appendChild(article);
        setupSlider(article.querySelector('.slider'));
      });
      
      renderPagination();
      scrollToTopProduct(100); 
      grid.classList.remove('fading');
    }, 150);
  }

  function renderPagination() {
    const pagination = document.getElementById('pagination');
    const grid = document.getElementById('product-grid');
    if (!pagination) return;

    pagination.innerHTML = '';

    const createBtn = (text, disabled, targetPage) => {
      const btn = document.createElement('button');
      btn.textContent = text;
      btn.disabled = disabled;
      btn.onclick = () => {
        if (!grid.classList.contains('fading')) renderPage(targetPage);
      };
      return btn;
    };

    pagination.appendChild(createBtn('Prev', currentPage === 1, currentPage - 1));

    const pageInput = document.createElement('input');
    pageInput.type = 'number';
    pageInput.value = currentPage;
    pageInput.onkeydown = (e) => {
      if (e.key === 'Enter' && !grid.classList.contains('fading')) {
        let val = Math.min(Math.max(parseInt(pageInput.value), 1), totalPages);
        renderPage(val);
      }
    };
    pagination.appendChild(pageInput);

    const totalText = document.createElement('span');
    totalText.textContent = ` of ${totalPages}`;
    pagination.appendChild(totalText);

    pagination.appendChild(createBtn('Next', currentPage === totalPages, currentPage + 1));
  }

  function setupSlider(slider) {
    const slides = slider.querySelector('.slides');
    const count = slides.children.length;
    let index = 0;

    const update = () => slides.style.transform = `translateX(-${index * 100}%)`;

    slider.querySelector('.prev').onclick = (e) => {
      e.stopPropagation(); e.preventDefault();
      index = (index - 1 + count) % count;
      update();
    };

    slider.querySelector('.next').onclick = (e) => {
      e.stopPropagation(); e.preventDefault();
      index = (index + 1) % count;
      update();
    };
  }

  function scrollToTopProduct(gap = 50) {
    const grid = document.getElementById('product-grid');
    if (!grid) return;
    const topPos = grid.getBoundingClientRect().top + window.pageYOffset - gap;
    window.scrollTo({ top: topPos, behavior: 'smooth' });
  }

  loadProducts();
</script>
</body>
</html>
